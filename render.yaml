services:
  - type: web
    name: shopwire-api
    runtime: rust
    plan: free
    buildCommand: cargo build --release
    startCommand: ./target/release/shopwire
    healthCheckPath: /healthz
    envVars:
      - key: RUST_LOG
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: shopwire-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: shopwire-redis
          property: connectionString
  - type: keyvalue
    name: shopwire-redis
    plan: free
    ipAllowList: []

databases:
  - name: shopwire-db
    plan: free
